[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.25"
optimizer = true
optimizer_runs = 200
via_ir = false
skip = [
  "lib/openzeppelin-contracts/certora/**",
  "lib/v2-core/contracts/UniswapV2Factory.sol",
  "lib/v2-core/contracts/UniswapV2ERC20.sol",
  "lib/v2-core/contracts/UniswapV2Pair.sol",
  "lib/v2-core/contracts/test/**",
  "lib/v2-core/contracts/libraries/**",
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
